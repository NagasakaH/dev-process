task_name: "API Gateway + Lambda(.NET) + Step Functions サンプルアプリと CI/CD 基盤の構築"
ticket_id: "floci-apigateway-csharp-001"

description:
  overview: >-
    floci を AWS シミュレータとして利用し、API Gateway、.NET 8 Lambda、
    Step Functions を組み合わせた Todo API サンプルアプリを作成する。
    Terraform で floci 上にデプロイできる IaC を用意し、GitLab CI では
    xUnit の単体テスト、Lambda テスト、API Gateway 経由の E2E テストまでを
    floci 上で実行できる仕組みを構築する。
  purpose: >-
    .NET Lambda と AWS サーバーレス構成を floci で継続的に検証できる
    参照実装を提供し、Terraform デプロイ、GitLab CI、テスト、デバッグの
    標準的な手順を README から再現できるようにする。
  background: >-
    https://github.com/floci-io/floci.git を関連リポジトリとして参照し、
    floci が提供する AWS シミュレータ機能を使って API Gateway/Lambda/
    Step Functions の動作検証を CI 内で完結させる。実AWSは利用せず、
    ローカルおよび CI の責務は floci 上の検証までとする。
  requirements:
    functional:
      - "Todo API のサンプルを作成する。CRUD を中心とし、Step Functions は簡易的な Todo 処理フローで利用する。"
      - ".NET 8 Lambda を実装し、API Gateway から呼び出せる構成にする。"
      - "Step Functions ステートマシンを Terraform で定義し、Lambda と連携させる。"
      - "Terraform で API Gateway、Lambda、Step Functions、および必要な権限を定義する。"
      - "GitLab CI で xUnit の単体テストを実行する。"
      - "GitLab CI で Lambda ハンドラ/関数レベルのテストを実行する。"
      - "GitLab CI で floci を使い、API Gateway 経由の E2E テストを実行する。"
      - "README にローカル実行、CI、Terraform デプロイ、テスト、デバッグ方法を記載する。"
    non_functional:
      - "サンプルとして読みやすく、最小構成で再現しやすい構成にする。"
      - "GitLab CI 上で floci による検証を自動化し、実AWS資格情報なしでも主要テストを実行できるようにする。"
      - "Terraform state はローカル tfstate を基本とし、GitLab managed Terraform state 化は README の補足として記載する。"
      - ".NET 8 と Terraform の一般的な開発フローに沿った構成にする。"
  acceptance_criteria:
    - "作成先リポジトリに Todo API サンプルの .NET 8 Lambda 実装が含まれている。"
    - "Terraform で API Gateway、Lambda、Step Functions のサンプル構成を floci 上にデプロイできる。"
    - "GitLab CI で xUnit 単体テストが実行される。"
    - "GitLab CI で Lambda ハンドラ/関数レベルのテストが実行される。"
    - "GitLab CI で floci を使った API Gateway 経由の E2E テストが実行される。"
    - "README にセットアップ、ローカル実行、Terraform による floci デプロイ、CI、テスト、デバッグ方法が記載されている。"
    - "実AWSを使わず、floci のみでデプロイとテストが完結する構成になっている。"
  test_scope:
    - unit
    - integration
    - e2e
  scope:
    - "Todo API サンプルアプリの新規作成"
    - ".NET 8 Lambda、API Gateway、Step Functions の最小構成"
    - "Terraform による IaC 定義"
    - "GitLab CI による floci 上の単体/結合/E2E テスト自動化"
    - "README の手順・デバッグ方法整備"
  out_of_scope:
    - "本番運用向けの認証/認可、監視、アラート、マルチ環境運用の本格実装"
    - "実AWSへのデプロイ、および CI から実AWSへ自動デプロイする仕組み"
    - "複雑な Todo ドメインや永続化基盤の本格実装"
  notes: >-
    作成先リポジトリは新規または空に近い状態を想定し、base_branch は main とする。
    README では floci 向け Terraform 実行とローカル tfstate を基本手順とし、
    必要に応じて GitLab managed Terraform state へ移行する補足を記載する。

related_repositories:
  - name: "floci"
    url: "https://github.com/floci-io/floci.git"
    branch: "main"

target_repositories:
  - name: "floci-apigateway-csharp"
    url: "git@gitlab.com:nagasaka-experimental/floci-apigateway-csharp.git"
    base_branch: "main"

options:
  create_design_document: true
  design_document_dir: "docs"
  submodules_dir: "submodules"
