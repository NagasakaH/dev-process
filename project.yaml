  updated_at: "2026-03-28T13:25:24+00:00"
setup:
  description:
    overview: >
      copilot-session-viewer にアクティブセッションの tmux pane 内容をリアルタイムで ブラウザ上に表示し、直接キー入力・操作ができるターミナルビューア画面を追加する。

    purpose: >
      ブラウザからターミナルの実画面を確認しそのまま操作できるようにする。

    background: >
      copilot-session-viewer は Next.js 16 (React 19, App Router) で構築。 tmux send-keys / capture-pane による間接操作は実装済み。 Docker コンテナ内 tmux にも対応。xterm.js 等は未使用。

    requirements:
      functional:
        - "アクティブセッション画面から tmux pane のターミナル表示を開ける"
        - "ターミナル表示はリアルタイム（数秒以内）で pane 内容が更新される"
        - "キーボード入力がそのまま tmux pane に送られ TUI アプリを直接操作できる"
        - "Docker コンテナ内の tmux pane にも対応する"
      non_functional:
        - "既存の ask_user 応答やセッション一覧機能に影響しない"
        - "ターミナル表示のレンダリングパフォーマンスが実用的であること"
        - "セキュリティ上、認証済みユーザーのみがターミナル操作できること"
    acceptance_criteria:
      - "アクティブセッション一覧からターミナルビューを開くUIが存在する"
      - "ターミナルビューに tmux pane の内容がリアルタイム表示される"
      - "キーボード入力が tmux pane に正しく送信される"
      - "Docker コンテナ内のセッションでもターミナルビューが動作する"
      - "既存のセッション一覧・ask_user 応答機能が正常に動作する"
    test_scope:
      - unit
      - integration
      - e2e
    scope:
      - "ターミナルビューコンポーネント（xterm.js 導入）"
      - "pane 内容のリアルタイム取得（WebSocket）"
      - "キー入力転送（WebSocket → tmux send-keys）"
      - "Docker コンテナ対応"
    out_of_scope:
      - "既存の ConversationTimeline 等の変更"
      - "新しい認証方式の追加（既存の Basic Auth を使用）"
      - "モバイル対応"
brainstorming:
  status: "completed"
  summary: "要件探索・テスト戦略確定。WebSocket + xterm.js + モーダル方式で合意"
  decisions:
    - topic: "表示方式"
      decision: "モーダル（オーバーレイ）でセッションカードからワンクリック起動"
      rationale: "現在の画面を残したまま大きく表示でき、UXが良い"
    - topic: "リアルタイム通信"
      decision: "WebSocket（custom server.js にWS組み込み）"
      rationale: "双方向通信で最高のレスポンス。キー入力転送にも最適"
    - topic: "レンダリング"
      decision: "xterm.js でANSIエスケープシーケンスを完全再現"
      rationale: "TUIアプリの表示を正確に再現するため"
    - topic: "入力方式"
      decision: "xterm.js onData → WebSocket → tmux send-keys パイプライン"
      rationale: "キー入力をリアルタイムで転送"
    - topic: "Docker対応"
      decision: "docker exec 経由で capture-pane / send-keys を実行"
      rationale: "既存の terminal.ts のDocker対応パターンを踏襲"
  test_strategy:
    scope:
      - unit
      - integration
      - e2e
    unit:
      framework: "Vitest"
      targets:
        - "WebSocket サーバーのメッセージハンドリング"
        - "tmux capture-pane のパース・ANSIデータ処理"
        - "Docker コンテナ対応ロジック"
    integration:
      framework: "Vitest"
      targets:
        - "WebSocket 接続→capture-pane→xterm.js 描画パイプライン"
        - "キー入力→WebSocket→tmux send-keys の往復"
    e2e:
      framework: "Playwright"
      environment: "Docker Compose (compose.dev.yaml)"
      targets:
        - "ターミナルビューモーダルの表示・操作"
        - "実際の tmux pane とのリアルタイム連携"
        - "既存機能への影響なし確認"
      execution: "docker compose exec viewer e2e-selftest"
