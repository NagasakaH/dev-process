    notes: round1 DR-001〜DR-016 は resolved_in_round=2、round2 DR2-001/DR2-002/DR2-003 は resolved_in_round=3 を維持。Opus 側の CI 安定性 Info は任意記録。次は design_review 人間チェックポイントの承認待ち。
