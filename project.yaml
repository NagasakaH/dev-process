brainstorming:
  status: "completed"
  started_at: "2026-03-07T00:10:00+00:00"
  completed_at: "2026-03-07T00:41:38+00:00"
  summary: |
    Git→SVN一方向同期の方式・ブランチ構成・テスト戦略を対話で確定。
    3ブランチ構成（main/svn/sync）を採用し、git-svn dcommitベースの同期方式を決定。
    2つの同期方式（マージ単位/日次バッチ）は設計フェーズで比較しユーザーが選択する。
  decisions:
    - question: "ブランチ構成はどうするか"
      decision: "3ブランチ構成: main（開発）、svn（SVN同期用orphan）、sync（同期ツール・CI設定・履歴管理用orphan）"
    - question: "同期方式はどれを採用するか"
      decision: "方式A（マージ単位コミット）と方式B（日次バッチ）の2案を設計フェーズで詳細比較し、ユーザーが選択"
    - question: "技術的な同期手法は何を使うか"
      decision: "mainの履歴をリニア化→svnブランチにコミット→git-svn dcommit。dcommit後のgit-svn-idメタ情報でCI環境破棄後も差分のみ同期可能"
    - question: "同期状態の管理方法は"
      decision: ".sync-state.yml をsyncブランチに配置。last_synced_commit/timestamp/sync_historyを記録"
    - question: "テスト戦略はどうするか"
      decision: "E2Eテストのみ（単体・結合なし）。gitlab-ci-localでcompose.yamlのSVNコンテナに対して実行"
  refined_requirements:
    - "svnブランチはorphanブランチとして作成し、dcommit後にgit push --forceする"
    - "syncブランチもorphanブランチとして作成する"
    - "CI実行時は毎回git clone→svnブランチcheckout→git svn init/fetchでSVN履歴を復元する"
    - "環境変数: SVN_URL, SVN_USERNAME, SVN_PASSWORD"
    - "同期フロー: clone→checkout svn→svn init→svn fetch→sync-state確認→リニア化→dcommit→push --force→履歴記録"
    - "E2Eテストで0から環境再構築後の増分同期の正常動作を検証する"
  test_strategy:
    scope:
      - "e2e"
    e2e:
      method: "gitlab-ci-localでcompose.yamlのSVNサーバーコンテナに対して同期を実行し検証"
      criteria:
        - "compose.yamlでSVNサーバーが起動し、svnコマンドでアクセスできる"
        - "同期スクリプトがGitのmainブランチの内容をSVNに正しく反映する"
        - "マージコミットを含む履歴が適切に変換されてSVNに記録される"
        - "増分同期が正しく動作する（前回同期以降の変更のみ反映）"
        - "同期スクリプトの再実行がべき等である"
        - "syncブランチにGitLab CI構成（.gitlab-ci.yml）が定義されている"
        - "gitlab-ci-localでE2Eテストが実行できる"
        - "0から環境を再構築後、増分同期が正しく動作する"
      environment: "Docker compose（ローカル SVN コンテナ）"
  artifacts: "docs/git-svn-backup/brainstorming/"
investigation:
  status: completed
  started_at: "2026-03-07T00:51:33+00:00"
  summary: "git-svn詳細動作・SVNコンテナ・gitlab-ci-local・履歴リニア化・3ブランチ構成の技術検証を実施。全て実験で動作確認済み。"
  key_findings:
    - git-svn dcommitはコミットSHAを書き換える（git-svn-id追加のため）。svnブランチではforce pushが必須
    - git-svn-idメタ情報によりCI環境で毎回git svn init/fetchしても.rev_mapが自動再構築される
    - git checkout COMMIT -- . 方式がリニア化に最適（ファイル追加/削除/リネームを正しく処理、実験確認済み）
    - gitlab-ci-localはservicesキーワード非対応。Docker Compose + --network hostで代替する
    - garethflowers/svn-serverが最もシンプル（svn://プロトコル、svnserve.conf + passwd認証）
  risks:
    - dcommit後のforce pushが拒否される可能性（svnブランチの保護解除が必要）
    - gitlab-ci-localとGitLab Runnerの動作差異（services非対応、ファイル同期差異）
    - 大量コミットの初回同期でCIジョブがタイムアウトする可能性
  artifacts: "docs/git-svn-backup/investigation/"
  completed_at: "2026-03-07T00:51:33+00:00"
