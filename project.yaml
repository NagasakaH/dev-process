      - docs/floci-apigateway-csharp/review-design/round-3/
    issues:
      - id: DR-001
        severity: critical
        category: AC7/実AWS不使用整合性
        description: AWS_ENDPOINT_URL 未設定時にデフォルトAWSエンドポイントへ接続し得る設計があり、floci 完結要件に違反する。
        status: resolved
