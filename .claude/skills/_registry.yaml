# =============================================================================
# スキルレジストリ — スキル分類と管理
# =============================================================================
# スキルの分類と、ワークフロー利用時のセクション対応を管理する。
# project.yaml のセクション管理は project-state スキルと
# prompts/workflow/*.md が担当する。
# =============================================================================

# ---------------------------------------------------------------------------
# 汎用スキル（プロジェクト非依存）
# ---------------------------------------------------------------------------
generic_skills:
  - brainstorming
  - investigation
  - design
  - review-design
  - plan
  - review-plan
  - implement
  - verification
  - code-review
  - code-review-fix
  - finishing-branch
  - init-work-branch
  - submodule-overview
  - commit
  - commit-multi-repo
  - systematic-debugging
  - test-driven-development
  - verification-before-completion
  - writing-skills
  - gitlab-api
  - terraform
  - aws-knowledge
  - aws-documentation

# ---------------------------------------------------------------------------
# プロジェクト固有スキル
# ---------------------------------------------------------------------------
project_skills:
  - project-state       # project.yaml/setup.yaml 状態管理
  - create-setup-yaml   # 対話的にsetup.yamlを作成
  - issue-to-setup-yaml # Issue → setup.yaml
  - skill-usage-protocol

# ---------------------------------------------------------------------------
# ワークフロー利用時のセクション対応（prompts/workflow/*.md が橋渡し）
# ---------------------------------------------------------------------------
workflow_sections:
  meta:
    description: "プロジェクトメタ情報"
    prompt: brainstorming
    notes: "brainstorming プロンプトが初期生成"

  setup:
    description: "setup.yaml からの引き継ぎ（読み取り専用）"
    prompt: brainstorming

  brainstorming:
    description: "ブレインストーミング結果"
    prompt: brainstorming

  overview:
    description: "サブモジュール概要"
    prompt: submodule-overview
    notes: "条件付き実行（サブモジュール存在時のみ）"

  investigation:
    description: "調査結果"
    prompt: investigation

  design:
    description: "設計結果"
    prompt: design
    sub_sections:
      review:
        prompt: review-design

  plan:
    description: "タスク計画"
    prompt: plan
    sub_sections:
      review:
        prompt: review-plan

  implement:
    description: "実装状況"
    prompt: implement

  verification:
    description: "検証結果"
    prompt: verification

  code_review:
    description: "コードレビュー結果"
    prompt: code-review
    notes: "code-review-fix プロンプトが issues の status を更新"

  finishing:
    description: "ブランチ完了情報"
    prompt: finishing-branch

  human_checkpoints:
    description: "人間チェックポイント管理"
    prompt: null
    notes: "project-state スキルの checkpoint コマンドで管理"

# =============================================================================
# プラグイン規約
# =============================================================================
# カスタム/実験的セクションには x- プレフィックスを使用する。
# =============================================================================
